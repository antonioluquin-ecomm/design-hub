<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maqueta — Productos a devolver</title>
<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet" />
<link rel="stylesheet" href="portal.css" />
</head>
<body onload="ppRestoreMotivo()">
  <div class="pp-topbar">
    <div class="pp-brand"><span class="pp-icon">▦</span> Gestión de Pedidos</div>
    <span class="pp-logout">⏻</span>
  </div>

  <div class="pp-layout">
    <div class="pp-main">
      <div class="pp-steps">Productos a devolver</div>
      <h1 class="pp-title">Indícanos que productos queres devolver</h1>

      <div class="pp-card">
        <table class="pp-table" id="tablaProductos">
          <thead>
            <tr><th>Producto</th><th>Motivo</th><th>Cantidad</th><th></th></tr>
          </thead>
          <tbody>
            <tr data-row>
              <td class="producto">Ojotas adidas adilette Aqua Unisex 41.5</td>
              <td class="motivo"></td>
              <td>1</td>
              <td class="acciones">
                <button class="pp-indicar-motivo-btn" onclick="ppGoToMotivo(0)">Indicar motivo</button>
                <button class="pp-icon-btn" onclick="ppGoToMotivo(0)">💬</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <button class="pp-btn muted" id="btnContinuar" onclick="ppContinuar('garantia-confirmar.html')">Continuar</button>
    </div>

    <div class="pp-sidebar">
      <h3>Detalle de la compra</h3>
      <div class="pp-sidebar-item">
        <img src="https://placehold.co/42x42/e8e8e8/999?text=%20" />
        <div><div class="pp-item-name">Ojotas adidas adilette Aqua Unisex 41.5</div><div class="pp-item-qty">1 unidad.</div></div>
      </div>
    </div>
  </div>

<script src="portal.js"></script>
</body>
</html>
